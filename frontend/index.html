<!DOCTYPE html>
<html>
<head>
<title>College AI Helpdesk</title>

<style>
.typing {
display: flex;
gap: 5px;
align-items: center;
}

.typing span {
width: 6px;
height: 6px;
background: #888;
border-radius: 50%;
animation: blink 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay: 0.2s;
}

.typing span:nth-child(3){
animation-delay: 0.4s;
}

@keyframes blink {
0% {opacity: 0.2;}
20% {opacity: 1;}
100% {opacity: 0.2;}
}

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:420px;
height:600px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#4a6cf7;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:10px 14px;
border-radius:16px;
max-width:75%;
font-size:14px;
}

.user{
align-self:flex-end;
background:#4a6cf7;
color:white;
}

.bot{
align-self:flex-start;
background:#e5e7eb;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #eee;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
}

button{
margin-left:10px;
padding:10px 16px;
border:none;
background:#4a6cf7;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3954d6;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
College AI Helpdesk
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
<input id="userInput" placeholder="Ask a question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");

const question = input.value;

if(!question) return;

chatBox.innerHTML += `<div class="message user">${question}</div>`;

input.value="";
chatBox.scrollTop = chatBox.scrollHeight;


/* typing bubble */
const typingBubble = document.createElement("div");
typingBubble.className = "message bot";
typingBubble.innerHTML = `
<div class="typing">
<span></span>
<span></span>
<span></span>
</div>
`;

chatBox.appendChild(typingBubble);
chatBox.scrollTop = chatBox.scrollHeight;


/* API call */

const response = await fetch("https://college-ai-helpdesk-3.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question})
});

const data = await response.json();

/* remove typing bubble */

typingBubble.remove();

/* show AI response */

chatBox.innerHTML += `<div class="message bot">${data.answer}</div>`;

chatBox.scrollTop = chatBox.scrollHeight;

}

</script>

</body>
</html>
